<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>USD/JPY テクニカル分析 ダッシュボード</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial@0.2.1/dist/chartjs-chart-financial.min.js"></script>
  <style>
    :root{--bg:#050b16;--panel:#0d1526;--panel2:#0b1220;--line:#23324a;--text:#e5eefb;--muted:#8ea0ba;--accent:#8cc8ff;--green:#31d27c;--red:#ff6b6b;--blue:#4ea1ff;--gold:#f5c451}
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:linear-gradient(180deg,#04101f 0%,var(--bg) 100%);color:var(--text)}
    .wrap{max-width:1400px;margin:0 auto;padding:16px}
    .top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:14px}
    h1{margin:0;font-size:28px;line-height:1.15}
    .sub{color:var(--muted);margin-top:6px;font-size:14px}
    .pills{display:flex;gap:10px;flex-wrap:wrap}
    .pill{border:1px solid var(--line);background:rgba(13,21,38,.92);border-radius:999px;padding:8px 12px;color:#b8c7dd;font-size:13px}
    .card{background:linear-gradient(180deg,rgba(13,21,38,.96),rgba(9,16,29,.96));border:1px solid var(--line);border-radius:18px;padding:14px 16px;box-shadow:0 14px 40px rgba(0,0,0,.22)}
    .label{color:var(--muted);font-size:12px;margin-bottom:8px}
    .value{font-size:28px;font-weight:800;letter-spacing:.02em}
    .small{margin-top:6px;color:var(--muted);font-size:13px}
    .muted{color:var(--muted)}
    .badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:999px;background:rgba(49,210,124,.13);color:#94f0ba;font-size:12px;font-weight:700}
    .badge.short{background:rgba(255,107,107,.13);color:#ffb0b0}
    .grid2{display:grid;grid-template-columns:2fr 1fr;gap:12px;margin-bottom:12px}
    .grid1{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
    .panel h2{margin:0 0 10px;font-size:16px}
    .chartbox{position:relative;height:420px}
    .chartbox.sm{height:330px}
    canvas{width:100%!important;height:100%!important;display:block}
    .pill.tf{cursor:pointer;background:rgba(13,21,38,.92);color:#b8c7dd;border:1px solid var(--line)}
    .pill.tf:hover{background:rgba(78,161,255,.15)}
    .pill.tf.active{background:rgba(140,200,255,.18);color:#fff;border-color:#4ea1ff}

    .summary-card{margin-bottom:12px;padding:16px 20px}
    .summary-header{font-size:12px;color:#8ea0ba;letter-spacing:.06em;margin-bottom:14px;text-transform:uppercase;font-weight:700}
    .summary-grid{display:grid;grid-template-columns:1fr 1fr 1.2fr;gap:0;align-items:stretch}
    .summary-cell{display:flex;flex-direction:column;justify-content:center;gap:4px;padding:6px 18px;position:relative}
    .summary-cell + .summary-cell{border-left:1px solid rgba(255,255,255,.07)}
    .summary-cell:first-child{padding-left:4px}
    .summary-cell:last-child{padding-right:4px}
    .summary-label{font-size:12px;color:#8ea0ba;letter-spacing:.04em}
    .summary-value-xl{font-size:30px;font-weight:800;color:#cdd9ee;line-height:1.1;font-feature-settings:'tnum'}
    .summary-value-lg{font-size:24px;font-weight:800;color:#31d27c;line-height:1.1;font-feature-settings:'tnum'}
    .summary-value-md{font-size:22px;font-weight:700;color:#cdd9ee;line-height:1.2}
    .summary-sub{font-size:12px;color:#8ea0ba}

    @media (max-width:1100px){
      .grid2,.grid1{grid-template-columns:1fr 1fr}
      .chartbox{height:360px}
      .summary-grid{grid-template-columns:1fr 1fr}
      .summary-cell + .summary-cell{border-left:none}
      .summary-cell:nth-child(2){border-left:1px solid rgba(255,255,255,.07)}
      .summary-cell:nth-child(3){border-top:1px solid rgba(255,255,255,.07);padding-top:14px;margin-top:6px}
      .summary-cell{padding:10px 16px}
    }
    @media (max-width:720px){
      .grid2,.grid1{grid-template-columns:1fr}
      .chartbox{height:320px}
      h1{font-size:22px}
      .summary-grid{grid-template-columns:1fr}
      .summary-cell + .summary-cell{border-left:none;border-top:1px solid rgba(255,255,255,.07);padding-top:12px;margin-top:6px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div style="flex:1">
        <h1>USD/JPY テクニカル分析ダッシュボード</h1>
        <div class="sub">直近5日分のローソク足 / ボリンジャーバンド</div>
        <!-- 時間帯バッジ -->
        <div id="sessionBar" style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;align-items:center">
          <div id="sessionNow" style="padding:6px 12px;border-radius:999px;font-size:13px;font-weight:700;background:#1b2440;color:#8ea0ba;border:1px solid #2a3550">セッション判定中…</div>
          <div id="sessionFlash" style="padding:6px 12px;border-radius:999px;font-size:12px;background:transparent;color:#8ea0ba"></div>
          <div id="sessionTime" style="margin-left:auto;font-size:12px;color:#8ea0ba"></div>
        </div>
      </div>
      <div class="pills" id="intervalPills">
        <button class="pill tf" data-tf="5min">5分</button>
        <button class="pill tf" data-tf="1h">1時間</button>
        <button class="pill tf" data-tf="4h">4時間</button>
        <button class="pill tf" data-tf="1day">1日</button>
      </div>
    </div>

    <!-- ===== 統合サマリーパネル: 非表示中 =====
    <div class="card summary-card">
      <div class="summary-header">マーケットサマリー</div>
      <div class="summary-grid">
        <div class="summary-cell">
          <div class="summary-label">前日比</div>
          <div class="summary-value-lg" id="dayChange">--</div>
          <div class="summary-sub" id="dayChangePct">--</div>
        </div>
        <div class="summary-cell">
          <div class="summary-label">RSI(14)</div>
          <div class="summary-value-md" id="rsiVal">--</div>
          <div class="summary-sub" id="rsiText">--</div>
        </div>
        <div class="summary-cell">
          <div class="summary-label">判定</div>
          <div class="summary-value-md" id="biasText">--</div>
          <div class="summary-sub">MA / MACD / RSI 加味</div>
        </div>
      </div>
    </div>
    ===== ここまで非表示 ===== -->

    <!-- app.js が参照する要素を hidden で残す(エラー防止) -->
    <div style="display:none">
      <span id="dayChange"></span>
      <span id="dayChangePct"></span>
      <span id="rsiVal"></span>
      <span id="rsiText"></span>
      <span id="biasText"></span>
    </div>

    <!-- エントリーシグナル -->
    <div class="card panel" id="signalCard" style="margin-bottom:12px;border:2px solid #2a3550">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap">
        <div>
          <div class="muted" style="font-size:12px">エントリーシグナル</div>
          <div id="signalAction" style="font-size:28px;font-weight:800;margin-top:4px">--</div>
          <div id="signalReason" class="muted" style="font-size:12px;margin-top:4px">--</div>
          <div id="perfectOrder" style="display:inline-block;margin-top:8px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;background:#1b2440;color:#8ea0ba;border:1px solid #2a3550">PO判定中…</div>
        </div>
        <div style="display:flex;gap:24px;flex-wrap:wrap">
          <div>
            <div class="muted" style="font-size:12px">エントリー</div>
            <div id="sigEntry" style="font-size:20px;font-weight:700">--</div>
          </div>
          <div>
            <div class="muted" style="font-size:12px;color:#31d27c">T/P (利確)</div>
            <div id="sigTP" style="font-size:20px;font-weight:700;color:#31d27c">--</div>
          </div>
          <div>
            <div class="muted" style="font-size:12px;color:#ff6b6b">S/L (損切)</div>
            <div id="sigSL" style="font-size:20px;font-weight:700;color:#ff6b6b">--</div>
          </div>
          <div>
            <div class="muted" style="font-size:12px">スコア</div>
            <div id="sigScore" style="font-size:20px;font-weight:700">--/5</div>
          </div>
        </div>
      </div>
    </div>

    <!-- メインチャート(S/R + 現在レート横線込み) -->
    <div class="card panel" style="margin-bottom:12px">
      <h2>ローソク足 + MA + BOLLINGER + 20PIPSゾーン + S/R + 現在レート</h2>
      <div class="chartbox"><canvas id="priceChart"></canvas></div>
    </div>

    <!-- 通貨強弱メーター(一番下へ移動) -->
    <div class="card panel" style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:10px;flex-wrap:wrap">
        <h2 style="margin:0;font-size:16px">通貨強弱(24h変化率%)</h2>
        <div class="small" id="strengthHint" style="margin:0">強い通貨を買い・弱い通貨を売る</div>
      </div>
      <div id="strengthBars" style="display:flex;flex-direction:column;gap:8px">
        <div class="small">読み込み中…</div>
      </div>
    </div>

  </div>
  <script src="./app.js" defer></script>
</body>
</html>
